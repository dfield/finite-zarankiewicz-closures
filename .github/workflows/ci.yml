name: Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: verification-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: Python ${{ matrix.python-version }} verification
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run the deterministic verification gate
        run: make verify

  lean:
    name: Lean arithmetic kernel
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: lean
          build: true
          test: false
          use-mathlib-cache: false
          nanoda: true
          nanoda-allow-sorry: false
      - name: Print theorem axiom dependencies
        working-directory: lean
        run: lake env lean AxiomAudit.lean
